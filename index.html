<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ 暗影格斗</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}
#gameContainer {
  position: relative;
  border: 2px solid #333;
  box-shadow: 0 0 30px rgba(255, 100, 0, 0.3);
}
canvas { display: block; }
#ui {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: none;
  z-index: 10;
}
.health-bar-container {
  width: 250px;
}
.player-name {
  color: #fff;
  font-size: 14px;
  margin-bottom: 4px;
  text-shadow: 0 0 10px currentColor;
}
.player-name.left { color: #4af; }
.player-name.right { color: #f55; text-align: right; }
.health-bar {
  width: 100%;
  height: 18px;
  background: #222;
  border: 1px solid #555;
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.health-fill {
  height: 100%;
  transition: width 0.3s ease;
  border-radius: 2px;
}
.health-fill.player { background: linear-gradient(180deg, #6cf, #28a); }
.health-fill.enemy { background: linear-gradient(180deg, #f66, #a22); }
.combo-display {
  position: absolute;
  top: 50px;
  color: #ff0;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 0 0 15px #ff0, 0 2px 4px rgba(0,0,0,0.8);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.combo-display.left { left: 20px; }
.combo-display.right { right: 20px; text-align: right; }
.combo-display.show { opacity: 1; }
#centerInfo {
  text-align: center;
  color: #fff;
  pointer-events: none;
}
#roundText {
  font-size: 48px;
  font-weight: bold;
  color: #ff0;
  text-shadow: 0 0 20px #ff0, 0 0 40px #f80;
  opacity: 0;
  transition: opacity 0.5s;
}
#timer {
  font-size: 32px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
}
#controls {
  color: #555;
  font-size: 12px;
  margin-top: 10px;
  text-align: center;
}
#startScreen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  cursor: pointer;
}
#startScreen h1 {
  font-size: 56px;
  color: #f80;
  text-shadow: 0 0 30px #f80, 0 0 60px #f40;
  margin-bottom: 10px;
}
#startScreen .subtitle {
  color: #888;
  font-size: 16px;
  margin-bottom: 40px;
}
#startScreen .start-btn {
  font-size: 24px;
  color: #fff;
  animation: pulse 1.5s ease-in-out infinite;
  border: 1px solid #555;
  padding: 12px 40px;
  border-radius: 4px;
  background: rgba(255,136,0,0.1);
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}
#gameOver {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#gameOver h2 {
  font-size: 48px;
  margin-bottom: 20px;
  text-shadow: 0 0 30px currentColor;
}
#gameOver .restart-btn {
  font-size: 20px;
  color: #aaa;
  margin-top: 30px;
  cursor: pointer;
  border: 1px solid #555;
  padding: 10px 30px;
  border-radius: 4px;
}
#gameOver .restart-btn:hover { color: #fff; border-color: #888; }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="game" width="960" height="540"></canvas>
  <div id="ui">
    <div class="health-bar-container">
      <div class="player-name left">⚔ 暗影武士</div>
      <div class="health-bar"><div class="health-fill player" id="playerHP"></div></div>
      <div class="combo-display left" id="playerCombo"></div>
    </div>
    <div id="centerInfo">
      <div id="timer">60</div>
    </div>
    <div class="health-bar-container">
      <div class="player-name right">赤焰恶魔 ☠</div>
      <div class="health-bar"><div class="health-fill enemy" id="enemyHP"></div></div>
      <div class="combo-display right" id="enemyCombo"></div>
    </div>
  </div>
  <div id="roundText"></div>

  <div id="startScreen">
    <h1>⚔ 暗影格斗</h1>
    <div class="subtitle">SHADOW FIGHT</div>
    <div class="start-btn">— 点击开始 / PRESS START —</div>
  </div>

  <div id="gameOver">
    <h2 id="resultText"></h2>
    <div id="resultDetail" style="color:#888; font-size:16px;"></div>
    <div class="restart-btn" onclick="restartGame()">再来一局</div>
  </div>
</div>

<div id="controls">
  A/D 移动 &nbsp;|&nbsp; W 跳跃 &nbsp;|&nbsp; J 拳击 &nbsp;|&nbsp; K 踢击 &nbsp;|&nbsp; L 格挡 &nbsp;|&nbsp; S+J 重击 &nbsp;|&nbsp; 空格 终极技
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 80;
const GRAVITY = 0.6;

// Game state
let gameRunning = false;
let roundTime = 60;
let timerInterval = null;
let particles = [];
let shakeTimer = 0;
let shakeIntensity = 0;
let flashTimer = 0;
let slowMoTimer = 0;

// Keys
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

class Fighter {
  constructor(x, isPlayer) {
    this.x = x;
    this.y = GROUND;
    this.vx = 0;
    this.vy = 0;
    this.w = 50;
    this.h = 80;
    this.hp = 100;
    this.maxHp = 100;
    this.facing = isPlayer ? 1 : -1;
    this.isPlayer = isPlayer;
    this.state = 'idle';
    this.stateTimer = 0;
    this.attackBox = null;
    this.hitCooldown = 0;
    this.combo = 0;
    this.comboTimer = 0;
    this.blockTimer = 0;
    this.isBlocking = false;
    this.ultimate = 0;
    this.maxUltimate = 100;
    this.dashTimer = 0;
    this.animFrame = 0;
    this.animTimer = 0;
    this.hurtTimer = 0;
    this.knockback = 0;
  }

  reset(x) {
    this.x = x; this.y = GROUND; this.vx = 0; this.vy = 0;
    this.hp = 100; this.state = 'idle'; this.stateTimer = 0;
    this.attackBox = null; this.hitCooldown = 0; this.combo = 0;
    this.comboTimer = 0; this.blockTimer = 0; this.isBlocking = false;
    this.ultimate = 0; this.hurtTimer = 0; this.knockback = 0;
  }

  get onGround() { return this.y >= GROUND; }

  update(target) {
    // Animation
    this.animTimer++;
    if (this.animTimer > 8) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

    // Combo timer
    if (this.comboTimer > 0) {
      this.comboTimer--;
      if (this.comboTimer <= 0) this.combo = 0;
    }

    // Hit cooldown
    if (this.hitCooldown > 0) this.hitCooldown--;
    if (this.hurtTimer > 0) this.hurtTimer--;

    // Gravity
    if (!this.onGround) {
      this.vy += GRAVITY;
      this.y += this.vy;
      if (this.y >= GROUND) { this.y = GROUND; this.vy = 0; }
    }

    // Knockback
    if (this.knockback !== 0) {
      this.x += this.knockback;
      this.knockback *= 0.85;
      if (Math.abs(this.knockback) < 0.5) this.knockback = 0;
    }

    // Movement
    this.x += this.vx;
    this.x = Math.max(30, Math.min(W - 30, this.x));

    // Friction
    if (this.onGround && this.state !== 'walk') this.vx *= 0.8;

    // Face target
    if (target) this.facing = target.x > this.x ? 1 : -1;

    // State timer
    if (this.stateTimer > 0) {
      this.stateTimer--;
      if (this.stateTimer <= 0) {
        this.state = 'idle';
        this.attackBox = null;
      }
    }

    // Blocking
    this.isBlocking = this.state === 'block' && this.blockTimer > 0;
    if (this.blockTimer > 0) this.blockTimer--;
    if (this.blockTimer <= 0 && this.state === 'block') this.state = 'idle';
  }

  punch() {
    if (this.state !== 'idle' && this.state !== 'walk') return;
    this.state = 'punch';
    this.stateTimer = 15;
    this.hitCooldown = 10;
    const reach = 65;
    this.attackBox = {
      x: this.x + this.facing * 25,
      y: this.y - 50,
      w: reach, h: 40,
      dmg: 8, type: 'punch',
      knockback: this.facing * 6
    };
  }

  kick() {
    if (this.state !== 'idle' && this.state !== 'walk') return;
    this.state = 'kick';
    this.stateTimer = 20;
    this.hitCooldown = 15;
    const reach = 75;
    this.attackBox = {
      x: this.x + this.facing * 25,
      y: this.y - 35,
      w: reach, h: 45,
      dmg: 12, type: 'kick',
      knockback: this.facing * 10
    };
  }

  heavyAttack() {
    if (this.state !== 'idle' && this.state !== 'walk') return;
    this.state = 'heavy';
    this.stateTimer = 30;
    this.hitCooldown = 25;
    this.attackBox = {
      x: this.x + this.facing * 20,
      y: this.y - 60,
      w: 85, h: 70,
      dmg: 22, type: 'heavy',
      knockback: this.facing * 18
    };
  }

  ultimateAttack(target) {
    if (this.ultimate < this.maxUltimate) return;
    if (this.state !== 'idle' && this.state !== 'walk') return;
    this.ultimate = 0;
    this.state = 'ultimate';
    this.stateTimer = 40;
    this.hitCooldown = 35;

    // Teleport toward target
    this.x = target.x - this.facing * 80;
    this.attackBox = {
      x: this.x + this.facing * 10,
      y: this.y - 70,
      w: 100, h: 90,
      dmg: 35, type: 'ultimate',
      knockback: this.facing * 25
    };

    flashTimer = 15;
    shakeTimer = 20;
    shakeIntensity = 12;
    slowMoTimer = 20;

    // Big particle burst
    for (let i = 0; i < 30; i++) {
      particles.push({
        x: this.x, y: this.y - 40,
        vx: (Math.random() - 0.5) * 15,
        vy: (Math.random() - 0.5) * 15,
        life: 40 + Math.random() * 30,
        color: this.isPlayer ? '#4af' : '#f55',
        size: 3 + Math.random() * 5
      });
    }
  }

  block() {
    if (this.state !== 'idle' && this.state !== 'walk') return;
    this.state = 'block';
    this.blockTimer = 30;
  }

  jump() {
    if (!this.onGround) return;
    this.vy = -13;
  }

  move(dir) {
    if (this.state === 'attack' || this.state === 'ultimate' || this.state === 'heavy') return;
    this.vx = dir * 5;
    if (this.onGround && this.state === 'idle') this.state = 'walk';
  }

  takeHit(dmg, kb) {
    if (this.isBlocking) {
      dmg = Math.floor(dmg * 0.15);
      kb *= 0.2;
      // Block particles
      for (let i = 0; i < 5; i++) {
        particles.push({
          x: this.x + this.facing * 30, y: this.y - 40,
          vx: this.facing * -3 + (Math.random()-0.5)*4,
          vy: -Math.random() * 5,
          life: 15, color: '#fff', size: 2
        });
      }
    } else {
      this.hurtTimer = 12;
      shakeTimer = 8;
      shakeIntensity = 5;
      // Hit particles
      for (let i = 0; i < 8; i++) {
        particles.push({
          x: this.x, y: this.y - 40,
          vx: (Math.random()-0.5) * 8,
          vy: -Math.random() * 8,
          life: 20 + Math.random() * 15,
          color: '#fa0',
          size: 2 + Math.random() * 3
        });
      }
    }
    this.hp = Math.max(0, this.hp - dmg);
    this.knockback = kb;
    this.ultimate = Math.min(this.maxUltimate, this.ultimate + dmg * 0.5);
  }

  draw() {
    ctx.save();
    const px = this.x;
    const py = this.y;
    const f = this.facing;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(px, GROUND + 5, 25, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Hurt flash
    const hurt = this.hurtTimer > 0;
    const col = this.isPlayer ? (hurt ? '#fff' : '#4af') : (hurt ? '#fff' : '#f55');

    ctx.translate(px, py);
    ctx.scale(f, 1);

    // Body
    const bob = this.onGround ? Math.sin(this.animTimer * 0.3) * 2 : 0;

    // Block stance
    if (this.isBlocking) {
      // Shield effect
      ctx.strokeStyle = '#ff0';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.3;
      ctx.beginPath();
      ctx.arc(10, -40, 35, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Legs
    const legAngle = this.state === 'walk' ? Math.sin(this.animTimer * 0.4) * 0.4 : 0;
    ctx.strokeStyle = col;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    // Left leg
    ctx.save();
    ctx.translate(-8, -5);
    ctx.rotate(legAngle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 25);
    ctx.stroke();
    ctx.restore();
    // Right leg
    ctx.save();
    ctx.translate(8, -5);
    ctx.rotate(-legAngle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 25);
    ctx.stroke();
    ctx.restore();

    // Torso
    ctx.strokeStyle = col;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(0, -5 + bob);
    ctx.lineTo(0, -45 + bob);
    ctx.stroke();

    // Arms
    let armAngle1 = 0, armAngle2 = 0;
    if (this.state === 'punch') {
      armAngle1 = -1.2;
      armAngle2 = 0.3;
    } else if (this.state === 'kick') {
      armAngle1 = -0.5;
      armAngle2 = 0.5;
    } else if (this.state === 'heavy') {
      armAngle1 = -1.5;
      armAngle2 = -0.5;
    } else if (this.state === 'ultimate') {
      armAngle1 = -1.8 + Math.sin(Date.now() * 0.05) * 0.3;
      armAngle2 = -1.2 + Math.cos(Date.now() * 0.05) * 0.3;
    } else if (this.state === 'walk') {
      armAngle1 = Math.sin(this.animTimer * 0.4) * 0.3;
      armAngle2 = -armAngle1;
    }

    // Left arm
    ctx.strokeStyle = col;
    ctx.lineWidth = 3;
    ctx.save();
    ctx.translate(-5, -42 + bob);
    ctx.rotate(armAngle1 + 0.5);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 22);
    ctx.stroke();
    ctx.restore();

    // Right arm
    ctx.save();
    ctx.translate(5, -42 + bob);
    ctx.rotate(armAngle2 - 0.5);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 22);
    ctx.stroke();
    ctx.restore();

    // Head
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(0, -55 + bob, 12, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = this.isPlayer ? '#0af' : '#f00';
    ctx.beginPath();
    ctx.arc(4 * f, -57 + bob, 3, 0, Math.PI * 2);
    ctx.fill();

    // Attack visual
    if (this.attackBox && this.state !== 'idle') {
      const ab = this.attackBox;
      ctx.globalAlpha = 0.3;
      if (this.attackBox.type === 'ultimate') {
        ctx.fillStyle = this.isPlayer ? '#4af' : '#f55';
        const cx = ab.x + ab.w/2 - px;
        const cy = ab.y + ab.h/2 - py;
        for (let i = 0; i < 3; i++) {
          const r = 30 + i * 15 + Math.sin(Date.now() * 0.02) * 10;
          ctx.beginPath();
          ctx.arc(cx * f, cy, r, 0, Math.PI * 2);
          ctx.fill();
        }
      } else {
        ctx.fillStyle = '#ff0';
        const rx = (ab.x + ab.w/2 - px) * f;
        const ry = ab.y + ab.h/2 - py;
        ctx.beginPath();
        ctx.arc(rx, ry, 15, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // Ultimate gauge border
    if (this.isPlayer) {
      const ux = -25, uy = -75;
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.strokeRect(ux, uy, 50, 5);
      ctx.fillStyle = this.ultimate >= this.maxUltimate ? '#ff0' : '#f80';
      ctx.fillRect(ux, uy, 50 * (this.ultimate / this.maxUltimate), 5);
      if (this.ultimate >= this.maxUltimate) {
        ctx.fillStyle = '#ff0';
        ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.5;
        ctx.font = '10px monospace';
        ctx.fillText('READY', ux + 8, uy - 3);
        ctx.globalAlpha = 1;
      }
    }

    ctx.restore();
  }
}

// AI
class AI {
  constructor(fighter) {
    this.fighter = fighter;
    this.thinkTimer = 0;
    this.action = 'idle';
    this.difficulty = 0.6; // 0-1
  }

  update(target) {
    this.thinkTimer--;
    if (this.thinkTimer > 0) return;

    const f = this.fighter;
    const dist = Math.abs(f.x - target.x);

    // Decision making
    const r = Math.random();

    if (dist > 200) {
      // Approach
      f.move(target.x > f.x ? 1 : -1);
      this.thinkTimer = 10 + Math.random() * 15;
    } else if (dist > 80) {
      if (r < 0.4) {
        f.move(target.x > f.x ? 1 : -1);
      } else if (r < 0.6) {
        f.jump();
      } else if (r < 0.85) {
        f.punch();
      } else {
        f.kick();
      }
      this.thinkTimer = 15 + Math.random() * 20;
    } else {
      // Close range
      if (r < 0.25) {
        f.punch();
      } else if (r < 0.45) {
        f.kick();
      } else if (r < 0.55) {
        f.heavyAttack();
      } else if (r < 0.7) {
        f.block();
      } else if (r < 0.8) {
        f.jump();
      } else {
        // Dodge back
        f.move(target.x > f.x ? -1 : 1);
      }
      this.thinkTimer = 12 + Math.random() * 18;
    }

    // Use ultimate when available
    if (f.ultimate >= f.maxUltimate && dist < 250 && Math.random() < 0.3) {
      f.ultimateAttack(target);
      this.thinkTimer = 40;
    }
  }
}

const player = new Fighter(200, true);
const enemy = new Fighter(760, false);
const ai = new AI(enemy);

function checkHit(attacker, defender) {
  if (!attacker.attackBox || attacker.hitCooldown > 0) return;
  const ab = attacker.attackBox;
  const db = { x: defender.x - defender.w/2, y: defender.y - defender.h, w: defender.w, h: defender.h };

  // Adjust attack box for facing
  const ax = attacker.facing > 0 ? ab.x : ab.x - ab.w;

  if (ax < db.x + db.w && ax + ab.w > db.x && ab.y < db.y + db.h && ab.y + ab.h > db.y) {
    defender.takeHit(ab.dmg, ab.knockback);
    attacker.hitCooldown = 20;
    attacker.combo++;
    attacker.comboTimer = 60;
    attacker.ultimate = Math.min(attacker.maxUltimate, attacker.ultimate + ab.dmg * 0.3);

    // Show combo
    const comboEl = attacker.isPlayer ? document.getElementById('playerCombo') : document.getElementById('enemyCombo');
    if (attacker.combo > 1) {
      comboEl.textContent = attacker.combo + ' COMBO!';
      comboEl.classList.add('show');
      setTimeout(() => comboEl.classList.remove('show'), 800);
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / 50), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(0.5, '#1a1025');
  grad.addColorStop(1, '#0d0d1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Moon
  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath();
  ctx.arc(800, 80, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0a0a1a';
  ctx.beginPath();
  ctx.arc(815, 75, 35, 0, Math.PI * 2);
  ctx.fill();

  // Stars
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 50; i++) {
    const sx = (i * 137.5) % W;
    const sy = (i * 97.3) % (H * 0.6);
    const bright = 0.3 + Math.sin(Date.now() * 0.001 + i) * 0.3;
    ctx.globalAlpha = bright;
    ctx.beginPath();
    ctx.arc(sx, sy, 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Mountains
  ctx.fillStyle = '#151525';
  ctx.beginPath();
  ctx.moveTo(0, H - 150);
  for (let i = 0; i <= W; i += 80) {
    ctx.lineTo(i, H - 150 - Math.sin(i * 0.01) * 50 - Math.cos(i * 0.02) * 30);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.fill();

  // Ground
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, GROUND + 5, W, H - GROUND);

  // Ground line
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND + 5);
  ctx.lineTo(W, GROUND + 5);
  ctx.stroke();

  // Ground texture
  ctx.fillStyle = '#222';
  for (let i = 0; i < W; i += 40) {
    ctx.fillRect(i, GROUND + 8, 20, 2);
  }
}

function updateUI() {
  document.getElementById('playerHP').style.width = (player.hp / player.maxHp * 100) + '%';
  document.getElementById('enemyHP').style.width = (enemy.hp / enemy.maxHp * 100) + '%';
}

function handlePlayerInput() {
  player.vx = 0;

  if (keys['KeyA'] || keys['ArrowLeft']) player.move(-1);
  if (keys['KeyD'] || keys['ArrowRight']) player.move(1);
  if (keys['KeyW'] || keys['ArrowUp']) player.jump();
  if (keys['KeyJ']) player.punch();
  if (keys['KeyK']) player.kick();
  if (keys['KeyL']) player.block();
  if (keys['Space']) player.ultimateAttack(enemy);

  // Heavy attack: S + J
  if (keys['KeyS'] && keys['KeyJ']) player.heavyAttack();
}

function checkGameOver() {
  if (player.hp <= 0 || enemy.hp <= 0) {
    endGame(player.hp <= 0 ? 'enemy' : 'player');
  }
}

function endGame(winner) {
  gameRunning = false;
  clearInterval(timerInterval);

  const resultText = document.getElementById('resultText');
  const resultDetail = document.getElementById('resultDetail');
  const gameOver = document.getElementById('gameOver');

  if (winner === 'player') {
    resultText.textContent = '🏆 胜利！';
    resultText.style.color = '#4af';
    resultDetail.textContent = '暗影武士获胜！连击数: ' + player.combo;
  } else {
    resultText.textContent = '💀 败北...';
    resultText.style.color = '#f55';
    resultDetail.textContent = '赤焰恶魔获胜...再接再厉！';
  }

  gameOver.style.display = 'flex';
}

function restartGame() {
  player.reset(200);
  enemy.reset(760);
  roundTime = 60;
  particles = [];
  document.getElementById('timer').textContent = '60';
  document.getElementById('gameOver').style.display = 'none';
  document.getElementById('roundText').style.opacity = '0';
  startGame();
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';

  // Round announcement
  const roundText = document.getElementById('roundText');
  roundText.textContent = 'FIGHT!';
  roundText.style.opacity = '1';
  setTimeout(() => roundText.style.opacity = '0', 1500);

  setTimeout(() => {
    gameRunning = true;
    timerInterval = setInterval(() => {
      if (!gameRunning) return;
      roundTime--;
      document.getElementById('timer').textContent = roundTime;
      if (roundTime <= 0) {
        endGame(player.hp >= enemy.hp ? 'player' : 'enemy');
      }
    }, 1000);
  }, 1500);
}

function gameLoop() {
  // Camera shake
  ctx.save();
  if (shakeTimer > 0) {
    shakeTimer--;
    const sx = (Math.random() - 0.5) * shakeIntensity;
    const sy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(sx, sy);
  }

  drawBackground();

  if (gameRunning) {
    // Slow motion effect
    const dt = slowMoTimer > 0 ? 0.5 : 1;
    if (slowMoTimer > 0) slowMoTimer--;

    handlePlayerInput();

    player.update(enemy);
    enemy.update(player);
    ai.update(player);

    checkHit(player, enemy);
    checkHit(enemy, player);

    checkGameOver();
  }

  updateParticles();
  drawParticles();

  player.draw();
  enemy.draw();

  // Flash effect
  if (flashTimer > 0) {
    flashTimer--;
    ctx.globalAlpha = flashTimer / 20;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  updateUI();

  ctx.restore();
  requestAnimationFrame(gameLoop);
}

// Start screen click
document.getElementById('startScreen').addEventListener('click', startGame);

// Mobile touch controls
let touchControls = false;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchControls = true;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (touch.clientX - rect.left) / rect.width;
  const y = (touch.clientY - rect.top) / rect.height;

  if (y < 0.3) player.jump();
  else if (x < 0.3) player.move(-1);
  else if (x > 0.7) player.move(1);
  else if (x < 0.5) player.punch();
  else player.kick();
});

// Init
gameLoop();
</script>
